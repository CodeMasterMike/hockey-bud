name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g., v1.0.0)'
        required: true
        type: string
  release:
    types: [published]

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: hockeyhub-prod-rg
  ACR_NAME: hockeyhubprodacr
  BACKEND_APP_NAME: hockeyhub-prod-api
  IMAGE_NAME: hockeyhub-api

jobs:
  build-and-push:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  migrate-database:
    name: Apply EF Core Migrations (with approval)
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get connection string from Key Vault
        id: kv
        run: |
          connstr=$(az keyvault secret show \
            --vault-name hockeyhub-prod-kv \
            --name PostgresConnectionString \
            --query value -o tsv)
          echo "::add-mask::$connstr"
          echo "db_connection=$connstr" >> "$GITHUB_OUTPUT"

      - name: Apply migrations
        working-directory: backend/src/HockeyHub.Api
        env:
          ConnectionStrings__PostgreSQL: ${{ steps.kv.outputs.db_connection }}
        run: |
          dotnet ef database update \
            --project ../HockeyHub.Data \
            --no-build || dotnet ef database update --project ../HockeyHub.Data

  deploy-backend:
    name: Deploy Backend Container App
    needs: [build-and-push, migrate-database]
    runs-on: ubuntu-latest
    outputs:
      backend-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App revision
        id: deploy
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }} \
            --revision-suffix "${{ needs.build-and-push.outputs.image-tag }}"

          url=$(az containerapp show \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$url" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend to Static Web App
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npx ng build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_PROD }}
          action: upload
          app_location: frontend/dist/frontend/browser
          skip_app_build: true
          skip_api_build: true

  smoke-tests:
    name: Smoke Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Health check — liveness
        run: |
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              "${{ needs.deploy-backend.outputs.backend-url }}/api/health/live" || true)
            if [ "$status" = "200" ]; then
              echo "Liveness check passed"
              break
            fi
            echo "Attempt $i: status=$status, retrying in 15s..."
            sleep 15
          done
          [ "$status" = "200" ] || (echo "Liveness check failed" && exit 1)

      - name: Health check — readiness
        run: |
          for i in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              "${{ needs.deploy-backend.outputs.backend-url }}/api/health/ready" || true)
            if [ "$status" = "200" ]; then
              echo "Readiness check passed"
              break
            fi
            echo "Attempt $i: status=$status, retrying in 15s..."
            sleep 15
          done
          [ "$status" = "200" ] || (echo "Readiness check failed" && exit 1)

      - name: Verify SignalR hub is connectable
        run: |
          status=$(curl -s -o /dev/null -w '%{http_code}' \
            "${{ needs.deploy-backend.outputs.backend-url }}/hubs/scores/negotiate?negotiateVersion=1" \
            -X POST || true)
          echo "SignalR negotiate status: $status"
          [ "$status" = "200" ] || echo "Warning: SignalR negotiate returned $status"
