name: Deploy Dev

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AZURE_RESOURCE_GROUP: hockeyhub-dev-rg
  ACR_NAME: hockeyhubdevacr
  BACKEND_APP_NAME: hockeyhub-dev-api
  IMAGE_NAME: hockeyhub-api

jobs:
  build-and-push:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push image
        working-directory: backend
        run: |
          docker build \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

  migrate-database:
    name: Run EF Migrations
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch DB connection string from Key Vault
        id: secrets
        run: |
          conn=$(az keyvault secret show \
            --vault-name hockeyhub-dev-kv \
            --name db-connection \
            --query value -o tsv)
          echo "::add-mask::$conn"
          echo "db-connection=$conn" >> "$GITHUB_OUTPUT"

      - name: Add runner IP to SQL Server firewall
        id: firewall
        run: |
          runner_ip=$(curl -s https://api.ipify.org)
          echo "runner-ip=$runner_ip" >> "$GITHUB_OUTPUT"
          az sql server firewall-rule create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server hockeyhub-dev-sql \
            --name "GitHubActions-${{ github.run_id }}" \
            --start-ip-address "$runner_ip" \
            --end-ip-address "$runner_ip"

      - name: Apply EF migrations
        working-directory: backend/src/HockeyHub.Api
        env:
          ConnectionStrings__DefaultConnection: ${{ steps.secrets.outputs.db-connection }}
        run: dotnet ef database update --project ../HockeyHub.Data

      - name: Remove runner IP from SQL Server firewall
        if: always()
        run: |
          az sql server firewall-rule delete \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server hockeyhub-dev-sql \
            --name "GitHubActions-${{ github.run_id }}" \
            --yes || true

  deploy-backend:
    name: Deploy Backend Container App
    needs: [build-and-push, migrate-database]
    runs-on: ubuntu-latest
    outputs:
      backend-url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App revision
        id: deploy
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }} \
            --revision-suffix "sha-$(echo ${{ needs.build-and-push.outputs.image-tag }} | cut -c1-7)"

          url=$(az containerapp show \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "url=https://$url" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend to Static Web App
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        working-directory: frontend
        run: |
          npm ci
          npx ng build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN_DEV }}
          action: upload
          app_location: frontend/dist/frontend/browser
          skip_app_build: true
          skip_api_build: true

  smoke-tests:
    name: Smoke Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Health check — liveness
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              "${{ needs.deploy-backend.outputs.backend-url }}/api/health/live" || true)
            if [ "$status" = "200" ]; then
              echo "Liveness check passed"
              break
            fi
            echo "Attempt $i: status=$status, retrying in 15s..."
            sleep 15
          done
          [ "$status" = "200" ] || (echo "Liveness check failed" && exit 1)

      - name: Health check — readiness
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w '%{http_code}' \
              "${{ needs.deploy-backend.outputs.backend-url }}/api/health/ready" || true)
            if [ "$status" = "200" ]; then
              echo "Readiness check passed"
              break
            fi
            echo "Attempt $i: status=$status, retrying in 15s..."
            sleep 15
          done
          [ "$status" = "200" ] || (echo "Readiness check failed" && exit 1)

      - name: Verify API responds
        run: |
          curl -sf "${{ needs.deploy-backend.outputs.backend-url }}/api/leagues/nhl/scores/ticker" \
            || echo "Ticker endpoint not yet seeded — acceptable for fresh deploy"
